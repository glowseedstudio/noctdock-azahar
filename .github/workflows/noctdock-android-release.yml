# Publishes NoctDock Azahar debug + release APKs to GitHub Releases.
# Tag with v* (e.g. v0.1.0) or run manually from the Actions tab.

name: NoctDock Android release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apks:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_SLOPPINESS: time_macros
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set tag name
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "GIT_TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "GIT_TAG_NAME=manual-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.CCACHE_DIR }}
          key: noctdock-android-release-${{ github.sha }}
          restore-keys: |
            noctdock-android-release-
            ${{ runner.os }}-android-vanilla-

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ccache

      - name: Update Android SDK CMake
        run: |
          echo "y" | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "cmake;3.30.3"

      - name: Build debug and release APKs
        run: JAVA_HOME=$JAVA_HOME_17_X64 ./.ci/noctdock-publish-apks.sh
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: NoctDock Azahar ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            noctdock-release-apks/*.apk
          body: |
            Pre-built **NoctDock Azahar** APKs for sideloading on Android 10+ (API 29).

            | File | Package | Notes |
            | --- | --- | --- |
            | `*-debug.apk` | `com.glowseed.noctdock.azahar.debug` | For testing; can install alongside release. |
            | `*-release.apk` | `com.glowseed.noctdock.azahar` | Minified build for day-to-day use. |

            You also need **NoctDock Sender** and **NoctDock Receiver** from the [noctdock](https://github.com/glowseedstudio/noctdock) repository.

            Source for this tag is in this repository (GPLv2). Without Play Store signing secrets, the release APK may be signed with a debug key — fine for sideloading, not for Play upload.

      - name: Upload APK artifacts (manual run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: noctdock-apks-${{ github.run_number }}
          path: noctdock-release-apks/*.apk
